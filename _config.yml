# Remote theme directory
remote_theme: analytics-link/analytics-link.github.io

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme

#-------------------------------
# General Site Settings
title: Antonia Iaquinta
description: "Hi I'm Tonii, an engineer by trade, looking to pivot my career to be more data science oriented. My portfolio contains interesting projects I've recently undertaken, with a strong emphasis on business impact. Please visit my Github & LinkedIn pages (or download my Resume) by using the links below!"
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

#-------------------------------
# About Section
subtitle: Data Science <span style="color:#f58506"> Portfolio </span>
location: "Massachusetts, US"
resume_url: /docs/antonia_iaquinta_resume.docx
avatar_image: /img/my_headshot.jpg

#-------------------------------
# Contact links
linkedln: "https://linkedln.com/antonia-iaquinta/" # Add your linkedln handle
github: "https://github.com/golden-hail/golden-hail.github.io"  # Add your github handle

paginate: 6
paginate_path: "/page/:num"

sass:
  sass_dir: _sass
  style: compressed # possible values: nested expanded compact compressed

defaults:
  - scope:
      type: posts
    values:
      layout: post
      read_time: true
      share: false


